services:
  gateguard-shard-0:
    image: postgres:17
    container_name: gateguard-shard-0
    restart: unless-stopped
    environment:
      POSTGRES_DB: gateguard_shard_0
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: shard_root
    ports:
      - "5433:5432"
    volumes:
      - shard0_data:/var/lib/postgresql/data

  gateguard-shard-1:
    image: postgres:17
    container_name: gateguard-shard-1
    restart: unless-stopped
    environment:
      POSTGRES_DB: gateguard_shard_1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: shard_root
    ports:
      - "5434:5432"
    volumes:
      - shard1_data:/var/lib/postgresql/data

  gateguard-shard-2:
    image: postgres:17
    container_name: gateguard-shard-2
    restart: unless-stopped
    environment:
      POSTGRES_DB: gateguard_shard_2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: shard_root
    ports:
      - "5435:5432"
    volumes:
      - shard2_data:/var/lib/postgresql/data

volumes:
  shard0_data:
  shard1_data:
  shard2_data:
